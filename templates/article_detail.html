<h1>{{ article.titulo }}</h1>
<p>{{ article.contenido }}</p>
<p>Category: {{ article.categoria }}</p>
<p>Status: {{ article.estado }}</p>

<!-- Display the author's name -->
<p>Author: {{ article.autor.username }}</p>

{% if current_user.is_authenticated %}
    {% if current_user.is_admin() or current_user.is_editor() %}
        <a href="{{ url_for('edit_article', id=article.id) }}">Edit Article</a>
    {% endif %}
{% endif %}
