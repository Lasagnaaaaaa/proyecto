{% extends "layout.html" %}
{% block title %}User List{% endblock %}
{% block content %}
<h3 class="mb-4">List of Registered Users</h3>

<table class="table table-striped table-hover">
  <thead class="table-light">
    <tr>
      <th>Username</th>
      <th>Email</th>
      <th>Role</th>
      <th class="text-center">Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for usuario in usuarios %}
    <tr>
      <td>{{ usuario.username }}</td>
      <td>{{ usuario.email }}</td>
      <td>{{ usuario.role.name }}</td>
      <td class="text-center">
        <a class="btn btn-sm btn-info" href="{{ url_for('main.ver_usuario', id=usuario.id) }}" title="View user">
          <i class="bi bi-eye"></i>
        </a>
        <form method="POST" action="{{ url_for('main.eliminar_usuario', id=usuario.id) }}" style="display: inline" onsubmit="return confirm('Are you sure you want to delete this user?');">
          <button type="submit" class="btn btn-sm btn-danger" title="Delete user">
            <i class="bi bi-trash"></i>
          </button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
